<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Lustre — Discovery</title>
<!-- Fonts: Epilogue (Headline), Plus Jakarta Sans (Body), Be Vietnam Pro (Label) -->

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {

<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .polaroid-shadow {
        box-shadow: 0 10px 30px -10px rgba(33, 26, 23, 0.15);
      }
      .asymmetric-polaroid {
        padding: 12px 12px 48px 12px;
      }
      .tonal-gradient {
        background: linear-gradient(180deg, rgba(184, 115, 51, 0.08) 0%, rgba(253, 248, 243, 1) 100%);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface selection:bg-primary-fixed min-h-screen flex flex-col">
<!-- TopAppBar Component -->
<header class="bg-[#fff8f6]/60 dark:bg-[#211a17]/60 backdrop-blur-md docked full-width top-0 z-50 bg-gradient-to-b from-[#eedfda]/20 to-transparent shadow-none flex justify-between items-center w-full px-6 py-4 fixed">
<button class="text-[#894d0d] dark:text-[#b87333] hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="font-['Epilogue'] font-extrabold text-[#894d0d] dark:text-[#b87333] tracking-tighter text-2xl">Lustre</h1>
<button class="text-[#894d0d] dark:text-[#b87333] hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="tune">tune</span>
</button>
</header>
<!-- Main Content: The Discovery Canvas -->
<main class="flex-grow pt-24 pb-32 flex flex-col items-center justify-center tonal-gradient px-6 overflow-hidden">
<!-- Polaroid Stack Container -->
<div class="relative w-full max-w-sm aspect-[3/4] flex items-center justify-center">
<!-- Back Card 3 -->
<div class="absolute inset-0 bg-surface-container-lowest asymmetric-polaroid rounded-xl polaroid-shadow rotate-[4deg] scale-[0.98] translate-y-2 opacity-60">
<div class="w-full h-full bg-surface-container-high rounded-sm"></div>
</div>
<!-- Back Card 2 -->
<div class="absolute inset-0 bg-surface-container-lowest asymmetric-polaroid rounded-xl polaroid-shadow -rotate-[3deg] scale-[0.99] translate-y-1 opacity-80">
<div class="w-full h-full bg-surface-container-high rounded-sm"></div>
</div>
<!-- Back Card 1 -->
<div class="absolute inset-0 bg-surface-container-lowest asymmetric-polaroid rounded-xl polaroid-shadow rotate-[1deg] translate-y-0.5 opacity-90">
<div class="w-full h-full bg-surface-container-high rounded-sm"></div>
</div>
<!-- Main Interactive Polaroid Card -->
<div class="absolute inset-0 bg-surface-container-lowest asymmetric-polaroid rounded-xl polaroid-shadow -rotate-[2deg] transition-transform hover:rotate-0 duration-500 cursor-pointer group">
<!-- User Photo -->
<div class="relative w-full aspect-square overflow-hidden rounded-sm bg-surface-container">
<img alt="Emma" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" data-alt="Close-up portrait of a radiant woman with freckles laughing, soft sunlight hitting her face, warm golden hour tones, intimate and natural aesthetic" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDL34xg7GBClwqFST8eDmyu--DBSpet8OlA-BYvxlcKodbjd1Zdc64JsWKJFJys7WYdVYqh_6pNvupS0UI3xNXQfrz2G7BS6PKZmLP0FWuMK33DnlWr1zzjrkuHMPOA5HNx3IHC_wkzLL4vvFH82MdooEpor78mi9qki4ASqaKnE96aTNhFvykpAou-4OEI2qiXMpR7XgyrVHr5LcOvarscUpe4_Tm0pULZUAHC_AaAX_FKd13ywnm8x5BH8uVd1_zKmpF4a59jTzA"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent"></div>
</div>
<!-- Polaroid Caption Area -->
<div class="mt-4 flex flex-col items-center justify-center space-y-1">
<h2 class="font-script text-2xl font-bold text-on-surface tracking-tight">Emma, 28</h2>
<p class="font-script text-lg text-primary/80 text-center leading-tight">Midnight conversations &gt; everything</p>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="flex items-center justify-center gap-8 mt-12 w-full">
<!-- Dislike/Pass -->
<button class="w-16 h-16 rounded-full bg-surface-container-lowest flex items-center justify-center text-tertiary polaroid-shadow hover:scale-110 active:scale-90 transition-all group">
<span class="material-symbols-outlined text-3xl" data-icon="close">close</span>
</button>
<!-- Super Like / Star -->
<button class="w-12 h-12 rounded-full bg-secondary-container/20 flex items-center justify-center text-secondary-fixed-dim hover:scale-110 active:scale-90 transition-all">
<span class="material-symbols-outlined text-2xl" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
</button>
<!-- Like/Heart -->
<button class="w-20 h-20 rounded-full bg-gradient-to-br from-primary to-primary-container flex items-center justify-center text-white polaroid-shadow hover:scale-110 active:scale-90 transition-all group">
<span class="material-symbols-outlined text-4xl" data-icon="favorite" style="font-variation-settings: 'FILL' 1;">favorite</span>
</button>
</div>
</main>
<!-- BottomNavBar Component -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 pt-4 bg-[#fff8f6]/80 dark:bg-[#211a17]/80 backdrop-blur-xl fixed bottom-0 w-full rounded-t-[2rem] border-t border-[#d8c3b4]/10 shadow-[0_-8px_30px_rgb(33,26,23,0.05)]">
<!-- Discover (Active) -->
<a class="flex flex-col items-center justify-center text-[#894d0d] dark:text-[#b87333] scale-110 font-bold hover:text-[#894d0d] dark:hover:text-[#b87333] transition-all Active: rotate-1 transition-transform duration-300" href="#">
<span class="material-symbols-outlined text-2xl mb-1" data-icon="explore" style="font-variation-settings: 'FILL' 1;">explore</span>
<span class="font-['Plus_Jakarta_Sans'] font-medium text-[10px] uppercase tracking-widest">Discover</span>
</a>
<!-- Messages -->
<a class="flex flex-col items-center justify-center text-[#211a17]/40 dark:text-[#fff8f6]/40 hover:text-[#894d0d] dark:hover:text-[#b87333] transition-all Active: rotate-1 transition-transform duration-300" href="#">
<span class="material-symbols-outlined text-2xl mb-1" data-icon="chat_bubble">chat_bubble</span>
<span class="font-['Plus_Jakarta_Sans'] font-medium text-[10px] uppercase tracking-widest">Messages</span>
</a>
<!-- Feed -->
<a class="flex flex-col items-center justify-center text-[#211a17]/40 dark:text-[#fff8f6]/40 hover:text-[#894d0d] dark:hover:text-[#b87333] transition-all Active: rotate-1 transition-transform duration-300" href="#">
<span class="material-symbols-outlined text-2xl mb-1" data-icon="amp_stories">amp_stories</span>
<span class="font-['Plus_Jakarta_Sans'] font-medium text-[10px] uppercase tracking-widest">Feed</span>
</a>
<!-- Profile -->
<a class="flex flex-col items-center justify-center text-[#211a17]/40 dark:text-[#fff8f6]/40 hover:text-[#894d0d] dark:hover:text-[#b87333] transition-all Active: rotate-1 transition-transform duration-300" href="#">
<span class="material-symbols-outlined text-2xl mb-1" data-icon="person">person</span>
<span class="font-['Plus_Jakarta_Sans'] font-medium text-[10px] uppercase tracking-widest">Profile</span>
</a>
</nav>
<!-- Floating Ink Note Decor (Design System: The Ink Pen) -->
<div class="fixed top-32 -left-6 transform -rotate-6 bg-secondary-container p-3 rounded-lg shadow-lg max-w-[140px] hidden md:block opacity-90">
<p class="font-script text-on-secondary-container text-sm">"Capturing real moments, one frame at a time."</p>
</div>
</body></html>
