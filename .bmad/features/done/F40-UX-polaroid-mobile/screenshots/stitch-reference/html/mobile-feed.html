</div>
</section>
<!-- Polaroid Feed -->
<div class="space-y-16 relative">
<!-- Post 1: Portrait Orientation -->
<article class="relative rotate-[-3deg] hover:rotate-0 transition-transform duration-500 ease-in-out">
<div class="bg-surface-container-lowest p-3 pb-12 polaroid-shadow">

</div>
</div>
<div class="flex items-center gap-6 mt-4 ml-4">

<span class="material-symbols-outlined text-primary group-active:scale-125 transition-transform" data-icon="favorite" style="font-variation-settings: 'FILL' 1;">favorite</span>
<span class="text-xs font-semibold uppercase tracking-widest text-on-surface-variant">248</span>
</button>
<button class="flex items-center gap-2 group">
<span class="material-symbols-outlined text-on-surface-variant group-active:scale-110 transition-transform" data-icon="chat_bubble">chat_bubble</span>
<span class="text-xs font-semibold uppercase tracking-widest text-on-surface-variant">12</span>
</button>
</div>
</article>

<button class="flex items-center gap-2">
