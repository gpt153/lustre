apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-nats-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lustre-nats.labels" . | nindent 4 }}
data:
  nats.conf: |
    port: 4222
    http_port: 8222

    jetstream {
      store_dir: /data/jetstream
      max_mem: 256M
      max_file: 5G
    }
