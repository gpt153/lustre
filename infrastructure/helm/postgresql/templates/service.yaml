apiVersion: v1
kind: Service
metadata:
  name: {{ include "lustre-postgresql.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lustre-postgresql.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.postgres.port }}
      targetPort: postgresql
      protocol: TCP
      name: postgresql
    {{- if .Values.pgbouncer.enabled }}
    - port: {{ .Values.service.pgbouncer.port }}
      targetPort: pgbouncer
      protocol: TCP
      name: pgbouncer
    {{- end }}
  selector:
    {{- include "lustre-postgresql.selectorLabels" . | nindent 4 }}
