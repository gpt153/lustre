apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "lustre-postgresql.fullname" . }}-initdb
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lustre-postgresql.labels" . | nindent 4 }}
data:
  init-extensions.sql: |
    CREATE EXTENSION IF NOT EXISTS postgis;
    CREATE EXTENSION IF NOT EXISTS vector;

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "lustre-postgresql.fullname" . }}-pgbouncer
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lustre-postgresql.labels" . | nindent 4 }}
data:
  pgbouncer.ini: |
    [databases]
    lustre = host=localhost port=5432 user={{ .Values.postgresql.user }} dbname={{ .Values.postgresql.database }}

    [pgbouncer]
    pool_mode = {{ .Values.pgbouncer.poolMode }}
    max_client_conn = {{ .Values.pgbouncer.maxClientConn }}
    default_pool_size = {{ .Values.pgbouncer.defaultPoolSize }}
    listen_port = {{ .Values.pgbouncer.port }}
    listen_addr = 0.0.0.0
    admin_users = {{ .Values.postgresql.user }}
    auth_type = md5
    auth_file = /etc/pgbouncer/userlist.txt
    logfile = /var/log/pgbouncer/pgbouncer.log
    pidfile = /var/run/pgbouncer/pgbouncer.pid
  userlist.txt: |
    "{{ .Values.postgresql.user }}" "{{ .Values.postgresql.password }}"
