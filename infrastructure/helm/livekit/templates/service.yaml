apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
      name: http
    - port: {{ .Values.service.rtcTcpPort }}
      targetPort: {{ .Values.service.rtcTcpPort }}
      protocol: TCP
      name: rtc-tcp
  selector:
    app: {{ .Release.Name }}
