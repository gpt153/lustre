replicaCount: 1

image:
  repository: ghcr.io/gpt153/lustre-medusa
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 9000

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.middlewares: lustre-prod-rate-limit@kubernetescrd
  hosts:
    - host: shop-admin.lovelustre.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: medusa-tls
      hosts:
        - shop-admin.lovelustre.com

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

env:
  - name: PORT
    value: "9000"
  - name: NODE_ENV
    value: production
  - name: ADMIN_CORS
    value: "https://shop-admin.lovelustre.com"
  - name: STORE_CORS
    value: "https://lovelustre.com,https://api.lovelustre.com"
  - name: AUTH_CORS
    value: "https://shop-admin.lovelustre.com,https://lovelustre.com"

livenessProbe:
  httpGet:
    path: /health
    port: 9000
  initialDelaySeconds: 30
  periodSeconds: 30
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 9000
  initialDelaySeconds: 15
  periodSeconds: 10
  failureThreshold: 3
