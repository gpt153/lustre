apiVersion: v1
kind: Namespace
metadata:
  name: lustre-prod
  labels:
    app.kubernetes.io/part-of: lustre
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: lustre-quota
  namespace: lustre-prod
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    pods: "50"
